rules:
  - apiGroups:
      - networking.k8s.io
    apiVersions:
      - v1
    resources:
      - ingresses
    operations:
      - CREATE
      - UPDATE
mutating: false
contextAware: false
annotations:
  # artifacthub specific
  io.artifacthub.displayName: Ingress No Default Backend Policy
  io.artifacthub.resources: Ingress
  io.artifacthub.keywords: ingress, defaultBackend
  # kubewarden specific
  io.kubewarden.policy.title: ingress-no-default-backend-policy
  io.kubewarden.policy.version: 1.1.0
  io.kubewarden.policy.description: Reject Ingress resources that define spec.defaultBackend
  io.kubewarden.policy.license: Apache-2.0
  io.kubewarden.policy.category: Ingress
  io.kubewarden.policy.severity: high
